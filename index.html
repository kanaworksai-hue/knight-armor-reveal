<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knight Reveal</title>
    <style>
      :root {
        color-scheme: dark;
        --cursor-x: 50%;
        --cursor-y: 50%;
        --cursor-x-px: 50vw;
        --cursor-y-px: 50vh;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050607;
      }

      body {
        cursor: none;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 100svh;
        overflow: hidden;
        isolation: isolate;
        background: #050607;
        touch-action: manipulation;
      }

      @supports (height: 100dvh) {
        .stage {
          height: 100dvh;
        }
      }

      .scene-video,
      .grade,
      .vignette,
      .cursor-ring {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .scene-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .armor-video {
        z-index: 0;
      }

      .training-video {
        z-index: 1;
        opacity: 0;
        will-change: opacity, mask-image, -webkit-mask-image;
      }

      .stage.is-active .training-video {
        opacity: 1;
      }

      .grade {
        z-index: 2;
        background:
          radial-gradient(circle at var(--cursor-x) var(--cursor-y), rgba(255, 187, 92, 0.12), transparent 18rem),
          radial-gradient(ellipse at center, transparent 58%, rgba(0, 0, 0, 0.38) 100%);
      }

      .vignette {
        z-index: 3;
        background:
          linear-gradient(90deg, rgba(2, 6, 8, 0.18), transparent 42%, rgba(2, 6, 8, 0.1)),
          linear-gradient(0deg, rgba(2, 6, 8, 0.2), transparent 44%, rgba(2, 6, 8, 0.08));
        mix-blend-mode: multiply;
      }

      .cursor-ring {
        z-index: 4;
        width: 310px;
        height: 310px;
        inset: auto;
        left: 0;
        top: 0;
        border: 1px solid rgba(255, 221, 161, 0.36);
        border-radius: 50%;
        box-shadow:
          0 0 48px rgba(255, 165, 70, 0.2),
          inset 0 0 46px rgba(255, 189, 104, 0.1);
        opacity: 0;
        transform: translate3d(calc(var(--cursor-x-px) - 155px), calc(var(--cursor-y-px) - 155px), 0);
        transition: opacity 180ms ease;
        will-change: transform, opacity;
      }

      .stage.is-active .cursor-ring {
        opacity: 1;
      }

      .brand-link,
      .social-link,
      .sound-panel {
        position: absolute;
        z-index: 6;
        pointer-events: auto;
        cursor: auto;
      }

      .brand-link {
        top: max(clamp(14px, 2vw, 24px), env(safe-area-inset-top));
        left: max(clamp(14px, 2vw, 24px), env(safe-area-inset-left));
        display: grid;
        place-items: center;
        width: clamp(58px, 7vw, 82px);
        height: clamp(58px, 7vw, 82px);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(4, 7, 10, 0.34);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(14px);
        transition:
          background 180ms ease,
          border-color 180ms ease,
          transform 180ms ease;
      }

      .brand-link:hover,
      .social-link:hover {
        background: rgba(8, 13, 18, 0.58);
        border-color: rgba(255, 223, 171, 0.34);
        transform: translateY(-1px);
      }

      .brand-logo {
        display: block;
        width: 76%;
        height: 76%;
        object-fit: contain;
      }

      .social-link {
        top: max(clamp(14px, 2vw, 24px), env(safe-area-inset-top));
        right: max(clamp(14px, 2vw, 24px), env(safe-area-inset-right));
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 42px;
        padding: 9px 13px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(4, 7, 10, 0.38);
        color: rgba(255, 255, 255, 0.92);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        text-decoration: none;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(14px);
        transition:
          background 180ms ease,
          border-color 180ms ease,
          transform 180ms ease;
      }

      .x-mark {
        display: grid;
        place-items: center;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #050607;
        font-size: 13px;
        font-weight: 900;
      }

      .sound-panel {
        left: 50%;
        bottom: max(clamp(16px, 3vw, 28px), env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: minmax(160px, 220px) minmax(160px, 220px);
        gap: 16px;
        width: min(calc(100vw - 32px), 492px);
        padding: 13px 15px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(4, 7, 10, 0.44);
        box-shadow: 0 20px 54px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(16px);
        transform: translateX(-50%);
      }

      .volume-control {
        display: grid;
        gap: 8px;
        min-width: 0;
        color: rgba(255, 255, 255, 0.9);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .volume-label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .volume-label output {
        color: rgba(255, 223, 171, 0.92);
        font-variant-numeric: tabular-nums;
      }

      .volume-slider {
        width: 100%;
        height: 22px;
        margin: 0;
        accent-color: #ffd36f;
        cursor: auto;
        touch-action: pan-x;
      }

      .mask-canvas {
        display: none;
      }

      @media (pointer: coarse) {
        body {
          cursor: auto;
        }

        .cursor-ring {
          display: none;
        }
      }

      @media (max-width: 640px) {
        .scene-video {
          object-position: center center;
        }

        .brand-link {
          width: 54px;
          height: 54px;
          border-radius: 14px;
        }

        .social-link {
          min-height: 38px;
          gap: 8px;
          padding: 8px 11px;
          font-size: 12px;
        }

        .x-mark {
          width: 20px;
          height: 20px;
          font-size: 12px;
        }

        .social-link {
          max-width: calc(100vw - 104px);
          overflow: hidden;
        }

        .social-link span:last-child {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .sound-panel {
          grid-template-columns: 1fr;
          gap: 12px;
          padding: 12px 14px;
          border-radius: 16px;
        }

        .volume-control {
          gap: 6px;
        }

        .volume-label {
          font-size: 10px;
        }

        .volume-slider {
          height: 26px;
        }
      }

      @media (max-width: 430px) and (orientation: portrait) {
        .scene-video {
          object-position: 52% center;
        }

        .sound-panel {
          bottom: max(12px, env(safe-area-inset-bottom));
          width: min(calc(100vw - 24px), 420px);
        }
      }

      @media (max-height: 520px) and (orientation: landscape) {
        .brand-link {
          width: 48px;
          height: 48px;
          border-radius: 13px;
        }

        .social-link {
          min-height: 34px;
          padding: 6px 10px;
          font-size: 12px;
        }

        .sound-panel {
          right: max(12px, env(safe-area-inset-right));
          bottom: max(12px, env(safe-area-inset-bottom));
          left: auto;
          width: min(360px, calc(100vw - 112px));
          grid-template-columns: 1fr 1fr;
          gap: 12px;
          padding: 10px 12px;
          transform: none;
        }

        .volume-label {
          font-size: 10px;
        }

        .volume-slider {
          height: 20px;
        }
      }

      @media (max-width: 340px) {
        .sound-panel {
          width: calc(100vw - 18px);
          padding: 10px 11px;
        }

        .social-link {
          max-width: calc(100vw - 86px);
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="Armor-to-training video reveal">
      <video id="armorVideo" class="scene-video armor-video" autoplay muted loop playsinline preload="auto" poster="./poster.jpg">
        <source src="./armor.mp4" type="video/mp4" />
      </video>
      <video id="trainingVideo" class="scene-video training-video" autoplay muted loop playsinline preload="auto">
        <source src="./training.mp4" type="video/mp4" />
      </video>
      <audio id="backgroundMusic" loop preload="auto">
        <source src="./background.mp3" type="audio/mpeg" />
      </audio>
      <audio id="ambienceTrack" loop preload="auto">
        <source src="./ambience.mp3" type="audio/mpeg" />
      </audio>

      <a class="brand-link" href="https://x.com/KanaWorks_AI" target="_blank" rel="noopener noreferrer" aria-label="KanaWorks AI on X">
        <img class="brand-logo" src="./brand-logo.png" alt="KanaWorks AI" />
      </a>
      <a class="social-link" href="https://x.com/KanaWorks_AI" target="_blank" rel="noopener noreferrer" aria-label="Follow KanaWorks AI on X">
        <span class="x-mark">X</span>
        <span>@KanaWorks_AI</span>
      </a>
      <div class="sound-panel" aria-label="Audio controls">
        <label class="volume-control">
          <span class="volume-label">
            <span>Music</span>
            <output id="musicValue">30%</output>
          </span>
          <input id="musicVolume" class="volume-slider" type="range" min="0" max="100" value="30" aria-label="Music volume" />
        </label>
        <label class="volume-control">
          <span class="volume-label">
            <span>Ambience</span>
            <output id="ambienceValue">80%</output>
          </span>
          <input id="ambienceVolume" class="volume-slider" type="range" min="0" max="100" value="80" aria-label="Ambience volume" />
        </label>
      </div>

      <div class="grade" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="cursor-ring" aria-hidden="true"></div>
      <canvas class="mask-canvas"></canvas>
    </main>

    <script>
      const SPOTLIGHT_R = 310;
      const TOUCH_SPOTLIGHT_R = 170;
      const EASE = 0.16;
      const MUSIC_VOLUME_KEY = "musicVolumeV2";
      const AMBIENCE_VOLUME_KEY = "ambienceVolumeV2";

      const stage = document.querySelector(".stage");
      const armorVideo = document.querySelector("#armorVideo");
      const trainingVideo = document.querySelector("#trainingVideo");
      const backgroundMusic = document.querySelector("#backgroundMusic");
      const ambienceTrack = document.querySelector("#ambienceTrack");
      const musicVolume = document.querySelector("#musicVolume");
      const ambienceVolume = document.querySelector("#ambienceVolume");
      const musicValue = document.querySelector("#musicValue");
      const ambienceValue = document.querySelector("#ambienceValue");
      const maskCanvas = document.querySelector(".mask-canvas");
      const maskCtx = maskCanvas.getContext("2d");

      const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      const smooth = { x: mouse.x, y: mouse.y };
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      let active = false;
      let audioStarted = false;
      let audioContext = null;
      let musicGain = null;
      let ambienceGain = null;
      let audioGraphReady = false;
      let lastTouchTime = 0;
      let spotlightRadius = SPOTLIGHT_R;
      let rafId = 0;

      function readVolume(key, fallback) {
        try {
          const stored = Number.parseInt(window.localStorage.getItem(key), 10);
          return Number.isFinite(stored) ? Math.min(100, Math.max(0, stored)) : fallback;
        } catch (error) {
          return fallback;
        }
      }

      function volumeLevel(input) {
        const value = Number.parseInt(input.value, 10);
        return Number.isFinite(value) ? Math.min(100, Math.max(0, value)) / 100 : 0;
      }

      function setGain(gain, level) {
        if (!audioContext || !gain) {
          return;
        }

        gain.gain.setTargetAtTime(level, audioContext.currentTime, 0.015);
      }

      function applyAudioLevels() {
        const musicLevel = volumeLevel(musicVolume);
        const ambienceLevel = volumeLevel(ambienceVolume);

        if (audioGraphReady) {
          backgroundMusic.volume = 1;
          ambienceTrack.volume = 1;
          setGain(musicGain, musicLevel);
          setGain(ambienceGain, ambienceLevel);
          return;
        }

        backgroundMusic.volume = musicLevel;
        ambienceTrack.volume = ambienceLevel;
      }

      function syncVolume(input, output, key) {
        const safeValue = Math.round(volumeLevel(input) * 100);
        output.value = `${safeValue}%`;
        try {
          window.localStorage.setItem(key, String(safeValue));
        } catch (error) {}
        applyAudioLevels();
      }

      function setupVolumes() {
        musicVolume.value = readVolume(MUSIC_VOLUME_KEY, 30);
        ambienceVolume.value = readVolume(AMBIENCE_VOLUME_KEY, 80);
        syncVolume(musicVolume, musicValue, MUSIC_VOLUME_KEY);
        syncVolume(ambienceVolume, ambienceValue, AMBIENCE_VOLUME_KEY);
      }

      function setupAudioGraph() {
        if (audioGraphReady) {
          return true;
        }

        if (!AudioContextClass) {
          return false;
        }

        audioContext = new AudioContextClass();
        const musicSource = audioContext.createMediaElementSource(backgroundMusic);
        const ambienceSource = audioContext.createMediaElementSource(ambienceTrack);
        musicGain = audioContext.createGain();
        ambienceGain = audioContext.createGain();
        musicSource.connect(musicGain).connect(audioContext.destination);
        ambienceSource.connect(ambienceGain).connect(audioContext.destination);
        audioGraphReady = true;
        applyAudioLevels();
        return true;
      }

      function resizeCanvas() {
        maskCanvas.width = window.innerWidth;
        maskCanvas.height = window.innerHeight;
        maskCtx.setTransform(1, 0, 0, 1, 0, 0);
      }

      function syncTrainingVideo(force = false) {
        if (!Number.isFinite(armorVideo.duration) || !Number.isFinite(trainingVideo.duration)) {
          return;
        }

        const drift = Math.abs(trainingVideo.currentTime - armorVideo.currentTime);
        if (force || drift > 0.045) {
          trainingVideo.currentTime = armorVideo.currentTime;
        }

        trainingVideo.playbackRate = armorVideo.playbackRate;
      }

      async function playVideos() {
        syncTrainingVideo(true);

        try {
          await Promise.all([armorVideo.play(), trainingVideo.play()]);
        } catch (error) {
          window.addEventListener(
            "pointerdown",
            () => {
              syncTrainingVideo(true);
              armorVideo.play();
              trainingVideo.play();
            },
            { once: true },
          );
        }
      }

      async function playBackgroundAudio() {
        if (audioStarted) {
          return;
        }

        try {
          setupAudioGraph();
          if (audioContext && audioContext.state !== "running") {
            await audioContext.resume();
          }

          applyAudioLevels();
          await Promise.all([backgroundMusic.play(), ambienceTrack.play()]);
          audioStarted = true;
        } catch (error) {
          audioStarted = false;
        }
      }

      function isInteractiveTarget(target) {
        return target instanceof Element && Boolean(target.closest(".sound-panel, .brand-link, .social-link"));
      }

      function clampPoint(x, y) {
        return {
          x: Math.min(window.innerWidth, Math.max(0, x)),
          y: Math.min(window.innerHeight, Math.max(0, y)),
        };
      }

      function updateCursorState(x, y) {
        stage.style.setProperty("--cursor-x", `${(x / window.innerWidth) * 100}%`);
        stage.style.setProperty("--cursor-y", `${(y / window.innerHeight) * 100}%`);
        stage.style.setProperty("--cursor-x-px", `${x}px`);
        stage.style.setProperty("--cursor-y-px", `${y}px`);
      }

      function setRevealPosition(x, y, snap = false) {
        const point = clampPoint(x, y);
        active = true;
        stage.classList.add("is-active");
        mouse.x = point.x;
        mouse.y = point.y;

        if (snap) {
          smooth.x = point.x;
          smooth.y = point.y;
          updateCursorState(point.x, point.y);
          applyRevealMask(point.x, point.y);
        }
      }

      function setTouchRevealPosition(x, y) {
        spotlightRadius = TOUCH_SPOTLIGHT_R;
        setRevealPosition(x, y, true);
      }

      function hideReveal() {
        active = false;
        stage.classList.remove("is-active");
        maskCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function setPointerPosition(event) {
        if (isInteractiveTarget(event.target)) {
          return;
        }

        spotlightRadius = event.pointerType === "touch" ? TOUCH_SPOTLIGHT_R : SPOTLIGHT_R;
        setRevealPosition(event.clientX, event.clientY, event.pointerType === "touch");
      }

      function setTouchPosition(event) {
        if (isInteractiveTarget(event.target)) {
          return;
        }

        lastTouchTime = Date.now();
        const touch = event.touches[0] || event.changedTouches[0];
        if (!touch) {
          return;
        }

        event.preventDefault();
        setTouchRevealPosition(touch.clientX, touch.clientY);
      }

      function endTouchReveal(event) {
        lastTouchTime = Date.now();
        hideReveal();
        playBackgroundAudio();
      }

      function endPointerReveal(event) {
        if (event.pointerType === "touch") {
          lastTouchTime = Date.now();
          hideReveal();
        }
      }

      function setClickPosition(event) {
        if (Date.now() - lastTouchTime < 700) {
          return;
        }

        if (isInteractiveTarget(event.target)) {
          return;
        }

        spotlightRadius = SPOTLIGHT_R;
        setRevealPosition(event.clientX, event.clientY, true);
      }

      function applyRevealMask(x, y) {
        maskCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        const radius = spotlightRadius;
        const gradient = maskCtx.createRadialGradient(x, y, 0, x, y, radius);
        gradient.addColorStop(0, "rgba(255,255,255,1)");
        gradient.addColorStop(0.38, "rgba(255,255,255,1)");
        gradient.addColorStop(0.58, "rgba(255,255,255,0.82)");
        gradient.addColorStop(0.74, "rgba(255,255,255,0.46)");
        gradient.addColorStop(0.9, "rgba(255,255,255,0.13)");
        gradient.addColorStop(1, "rgba(255,255,255,0)");

        maskCtx.beginPath();
        maskCtx.arc(x, y, radius, 0, Math.PI * 2);
        maskCtx.fillStyle = gradient;
        maskCtx.fill();

        const mask = `url(${maskCanvas.toDataURL("image/png")})`;
        trainingVideo.style.webkitMaskImage = mask;
        trainingVideo.style.maskImage = mask;
        trainingVideo.style.webkitMaskSize = "100% 100%";
        trainingVideo.style.maskSize = "100% 100%";
      }

      function animate() {
        smooth.x += (mouse.x - smooth.x) * EASE;
        smooth.y += (mouse.y - smooth.y) * EASE;

        updateCursorState(smooth.x, smooth.y);

        if (active) {
          applyRevealMask(smooth.x, smooth.y);
        }

        syncTrainingVideo(false);
        rafId = requestAnimationFrame(animate);
      }

      armorVideo.addEventListener("loadedmetadata", () => syncTrainingVideo(true));
      armorVideo.addEventListener("seeked", () => syncTrainingVideo(true));
      armorVideo.addEventListener("play", () => trainingVideo.play());
      armorVideo.addEventListener("pause", () => trainingVideo.pause());
      trainingVideo.addEventListener("loadedmetadata", () => syncTrainingVideo(true));

      window.addEventListener("pointermove", setPointerPosition, { passive: true });
      window.addEventListener("pointerdown", setPointerPosition, { passive: true });
      window.addEventListener("pointerup", endPointerReveal);
      window.addEventListener("pointercancel", endPointerReveal);
      window.addEventListener("pointerdown", playBackgroundAudio);
      window.addEventListener("click", setClickPosition);
      stage.addEventListener("touchstart", setTouchPosition, { passive: false });
      stage.addEventListener("touchmove", setTouchPosition, { passive: false });
      stage.addEventListener("touchend", endTouchReveal);
      stage.addEventListener("touchcancel", endTouchReveal);
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(rafId));

      musicVolume.addEventListener("input", () => {
        syncVolume(musicVolume, musicValue, MUSIC_VOLUME_KEY);
        playBackgroundAudio();
      });
      ambienceVolume.addEventListener("input", () => {
        syncVolume(ambienceVolume, ambienceValue, AMBIENCE_VOLUME_KEY);
        playBackgroundAudio();
      });

      resizeCanvas();
      setupVolumes();
      playVideos();
      rafId = requestAnimationFrame(animate);
    </script>
  </body>
</html>
